name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install project (lint deps only)
        run: uv pip install --system ruff mypy

      - name: Ruff
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # type errors should not block while migrating

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: testpwd
          POSTGRES_DB: legal_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:testpwd@localhost:5432/legal_ai_test
      FILE_PATH: /tmp/legal_ai_test_data
      LLM_PROVIDER: ollama
      OLLAMA_HOST: http://localhost:11434
      OPENAI_API_KEY: dummy-for-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Apply database schema
        run: |
          for f in sql/init.sql sql/*_*.sql; do
            if [ -f "$f" ]; then
              echo "Applying $f"
              PGPASSWORD=testpwd psql -h localhost -U postgres -d legal_ai_test -f "$f"
            fi
          done

      - name: Run tests
        run: pytest -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: legal-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
